name: "Bug Report"
description: "Report a reproducible bug or unexpected behavior in the system."
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        > Please fill out this form as completely as possible. Incomplete reports may be closed without investigation.

  - type: input
    id: affected_module
    attributes:
      label: "Affected Module / Service"
      description: "Which module, service, or area of the application is affected?"
      placeholder: "e.g., Auth, API Gateway, Dashboard, Worker"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Provide a minimal, reliable set of steps to reproduce the issue."
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "What should happen?"
      placeholder: "The system should..."
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      description: "What actually happens? Include error messages, stack traces, or logs if available."
      placeholder: "Instead, the system..."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      description: "How critical is this bug?"
      options:
        - "Critical - System crash, data loss, or security issue"
        - "High - Core functionality broken, no workaround"
        - "Medium - Functionality degraded, workaround exists"
        - "Low - Minor visual or non-blocking issue"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Environment"
      description: "Where was this bug observed?"
      placeholder: "e.g., Production, Staging, Local — Node 22, Docker 27"
    validations:
      required: true

  - type: textarea
    id: attachments
    attributes:
      label: "Attachments & Evidence"
      description: "Screenshots, logs, network traces, or any other supporting files."
      placeholder: "Drop files here or paste log output..."

  - type: markdown
    attributes:
      value: |
        ---
        *Note: Before submitting, verify the bug is reproducible and has not been reported already.*

  - type: textarea
    id: extras
    attributes:
      label: "Extras"
      description: "add extra information if needed"