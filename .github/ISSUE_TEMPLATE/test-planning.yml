name: "📋 Test Planning"
description: "Record the start of the testing phase and the strategy to follow for a new requirement."
title: "[QA Planning]: "
labels: ["qa", "planning"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## QA Start Strategy
        This issue formalizes the start of the functionality review. Before executing, we must ensure that the scope and resources are clear.

  - type: input
    id: pr_link
    attributes:
      label: "Pull Request / Requirements Documentation"
      description: "Link to the development document or functional specifications document."
      placeholder: "https://github.com/user/repo/.docs/..."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: "Test Scope"
      description: "What will be tested? Define the initial scope (during the test development, it can be adjusted in the comments of this issue)."
      placeholder: "e.g., Validation of NOM-035 calculations, Login flow with new roles..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "QA Priority"
      description: "How urgent is it to release this?"
      options:
        - "P0 - Blocking / Hotfix"
        - "P1 - High (New core functionality)"
        - "P2 - Medium (Minor improvement or change)"
        - "P3 - Low (Cosmetic / Refactor)"
    validations:
      required: true

  - type: textarea
    id: technical_readiness
    attributes:
      label: "Technical Requirements and Access"
      description: "Do you have everything to start? (DB, Endpoints, Environment variables, Docker images)."
      value: |
        - [ ] Development environment ready
        - [ ] API Documentation (Bruno)
        - [ ] Environment variables configured
        - [ ] General technical documentation (user stories, flows, architecture)
    validations:
      required: true

  - type: textarea
    id: test_strategy
    attributes:
      label: "Test Approach"
      description: "How do you plan to approach it?"
      value: |
        - [ ] Unit Tests 
        - [ ] Integration / API Tests
        - [ ] E2E Automation (Playwright)
        - [ ] Manual Tests (Exploratory)

  - type: input
    id: estimated_date
    attributes:
      label: "Estimated Completion Date"
      description: "When do you plan to have the execution report ready."
      placeholder: "DD/MM/YYYY"

  - type: textarea
    id: risks
    attributes:
      label: "Identified Risks"
      description: "Anything that might delay QA (e.g., 'The staging environment is unstable')."