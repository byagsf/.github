name: "🧪 Test Execution"
description: "Record the results of manual or automated test executions."
title: "[TEST]: "
labels: ["qa", "test-execution"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Test Execution Report
        Use this template to document the results of the test cases defined in the `TEST_PLAN.md`.

  - type: input
    id: test_plan_link
    attributes:
      label: "Test Plan / Test Cases Link"
      description: "Direct URL to the .md file or specific section in the repository."
      placeholder: "e.g., https://github.com/user/repo/blob/main/docs/TEST_PLAN.md"
    validations:
      required: true

  - type: dropdown
    id: test_type
    attributes:
      label: "Test Type"
      options:
        - "Manual - Step-by-step execution"
        - "Automated - Scripting (Playwright/Vitest/TestSprite)"
        - "Regression - Change verification"
        - "Smoke Test - Initial critical verification"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Environment"
      description: "Specify the branch, Docker version, or environment URL."
      placeholder: "e.g., branch: develop, env: staging, Bun v1.1"
    validations:
      required: true

  - type: textarea
    id: test_cases_checklist
    attributes:
      label: "Executed Test Cases Checklist"
      description: "List the IDs of the test cases (TC-XX) and their quick result."
      value: |
        - [ ] TC-01: [Test case name] - PASSED
        - [ ] TC-02: [Test case name] - FAILED
        - [ ] TC-03: [Test case name] - SKIPPED
    validations:
      required: true

  - type: dropdown
    id: final_verdict
    attributes:
      label: "Final Verdict"
      description: "Is the functionality stable to move to production?"
      options:
        - "🟢 PASS - Everything works as expected"
        - "🟡 PASS WITH ISSUES - Minor non-blocking issues"
        - "🔴 FAIL - Critical issues detected"
        - "⚪ BLOCKED - Testing could not be completed"
    validations:
      required: true

  - type: textarea
    id: bugs_found
    attributes:
      label: "Detected Bugs"