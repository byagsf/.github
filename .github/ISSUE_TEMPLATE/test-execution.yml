name: "🧪 Ejecución de Tests"
description: "Registra el resultado de la ejecución de pruebas manuales o automatizadas."
title: "[TEST]: "
labels: ["qa", "test-execution"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Reporte de Ejecución de Pruebas
        Utilice esta plantilla para documentar los resultados de los casos de prueba definidos en el `TEST_PLAN.md`.

  - type: input
    id: test_plan_link
    attributes:
      label: "Enlace al Test Plan / Casos de Prueba"
      description: "URL directa al archivo .md o sección específica en el repositorio."
      placeholder: "e.g., https://github.com/usuario/repo/blob/main/docs/TEST_PLAN.md"
    validations:
      required: true

  - type: dropdown
    id: test_type
    attributes:
      label: "Tipo de Prueba"
      options:
        - "Manual - Ejecución paso a paso"
        - "Automated - Scripting (Playwright/Vitest/TestSprite)"
        - "Regression - Verificación de cambios"
        - "Smoke Test - Verificación crítica inicial"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Ambiente / Entorno"
      description: "Especifica la rama, versión de Docker o URL del ambiente."
      placeholder: "e.g., branch: develop, env: staging, Bun v1.1"
    validations:
      required: true

  - type: textarea
    id: test_cases_checklist
    attributes:
      label: "Checklist de Casos Ejecutados"
      description: "Lista los IDs de los casos de prueba (TC-XX) y su resultado rápido."
      value: |
        - [ ] TC-01: [Nombre del caso] - PASSED
        - [ ] TC-02: [Nombre del caso] - FAILED
        - [ ] TC-03: [Nombre del caso] - SKIPPED
    validations:
      required: true

  - type: dropdown
    id: final_verdict
    attributes:
      label: "Veredicto Final"
      description: "¿La funcionalidad es estable para pasar a producción?"
      options:
        - "🟢 PASS - Todo funciona según lo esperado"
        - "🟡 PASS WITH ISSUES - Fallos menores no bloqueantes"
        - "🔴 FAIL - Fallos críticos detectados"
        - "⚪ BLOCKED - No se pudo completar la prueba"
    validations:
      required: true

  - type: textarea
    id: bugs_found
    attributes:
      label: "Bugs Detectados"