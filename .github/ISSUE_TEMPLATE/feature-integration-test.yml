name: "🚀 Flexible Feature Integration"
description: "A fully customizable template where you can edit notes and add requirements."
title: "[FEATURE]: "
labels: ["feature", "flexible-integration"]
body:
  - type: textarea
    id: dynamic_notes
    attributes:
      label: "📝 Guidance & Warnings (Editable)"
      description: "You can modify these notes if this specific task requires different instructions."
      value: |
        > [!IMPORTANT]
        >  TEXT HERE
        
        > [!TIP]
        > TEXT HERE
        
        > [!NOTE]
        > TEXT HERE
        
        > [!WARNING]
        > TEXT HERE
        
        > [!CAUTION]
        > TEXT HERE
        
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "⚡ Urgency Level"
      description: "Select one or choose 'Other' to specify a custom priority below."
      options:
        - "🔴 High (Blocker)"
        - "🟡 Medium (Evolutionary)"
        - "🟢 Low (Technical Improvement)"
        - "🔘 Other (Specify in next field)"
    validations:
      required: true

  - type: input
    id: custom_priority
    attributes:
      label: "➕ Custom Priority (If 'Other' selected)"
      placeholder: "e.g., 🟣 Critical Security Patch"

- type: textarea
    id: extra_requirements
    attributes:
      label: "🏗️ Additional & Custom Requirements"
      description: "Define specific technical constraints and use styling to prioritize."
      value: |
        ### 🧱 Core Infrastructure
        - [ ] 
        
        ### 🧪 Testing & Validation
        > [!NOTE]
        > *Ensure all tests follow the Bun:test suite.*
        - [ ] 
        
        ---
        ### 🚩 High Priority Features
        **Focus on these first:**
        - [ ] **Feature A:** `(Critical)`
        - [ ] **Feature B:** _(High Impact)_
        
        ### 📂 Documentation
        - [ ] Update `README.md`
        - [ ] Notify @carlosPadillaTorres
      placeholder: |
        Use ### for headers and > [!TIP] for extra style...
  - type: textarea
    id: ideas_notes
    attributes:
      label: "💡 Creative Space / Notes"
      description: "General notes or ideas for implementation."
