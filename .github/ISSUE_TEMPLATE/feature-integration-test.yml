name: "🚀 Flexible Feature Integration"
description: "A fully customizable template where you can edit notes and add requirements."
title: "[FEATURE]: "
labels: ["feature", "flexible-integration"]
body:
  - type: textarea
    id: dynamic_notes
    attributes:
      label: "📝 Guidance & Warnings (Editable)"
      description: "You can modify these notes if this specific task requires different instructions."
      value: |
        > [!IMPORTANT]
        >  TEXT HERE
        
        > [!TIP]
        > TEXT HERE
        
        > [!NOTE]
        > TEXT HERE
        
        > [!WARNING]
        > TEXT HERE
        
        > [!CAUTION]
        > TEXT HERE
        
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "⚡ Urgency Level"
      description: "Select one or choose 'Other' to specify a custom priority below."
      options:
        - "🔴 High (Blocker)"
        - "🟡 Medium (Evolutionary)"
        - "🟢 Low (Technical Improvement)"
        - "🔘 Other (Specify in next field)"
    validations:
      required: true

  - type: input
    id: custom_priority
    attributes:
      label: "➕ Custom Priority (If 'Other' selected)"
      placeholder: "e.g., 🟣 Critical Security Patch"

  - type: checkboxes
    id: standard_prerequisites
    attributes:
      label: "📋 Standard Requirements Checklist"
      options:
        - label: "Initial architecture review completed"
        - label: "Backward compatibility verified"
        - label: "Base documentation updated"

  - type: textarea
    id: extra_requirements
    attributes:
      label: "🏗️ Additional & Custom Requirements"
      description: "Add any other requirements or modify the ones above by typing them here."
      placeholder: |
        - [ ] New requirement 1
        - [ ] Integration with specific API X
        - [ ] Unit tests for module Y
      value: |
        - [ ] 

  - type: textarea
    id: ideas_notes
    attributes:
      label: "💡 Creative Space / Notes"
      description: "General notes or ideas for implementation."
