name: "🚀 Flexible Feature Integration"
description: "A fully customizable template where you can edit notes and add requirements."
title: "[FEATURE]: "
labels: ["feature", "flexible-integration"]
body:
  - type: textarea
    id: dynamic_notes
    attributes:
      label: "📝 Guidance & Warnings (Editable)"
      description: "You can modify these notes if this specific task requires different instructions."
      value: |
        > [!IMPORTANT]
        > in this feature the most important task is the integration with Google Drive. the main point is the user must manage your Drive without go to the platform.
        > this new feature is importat continue with the previous code, using code patterns, if you have some problem with the logic you can question of the correct team, example, if you have question about the documentation or maybe some test you can go with @carlosPadillaTorres for example.

        > [!TIP]
        > another thing is the correct comunication, each some time you must comunicate, you have two options, one: if you say the info in person you need to put that info in a new comment in parent issues, two: put directly the info in a new comment in parent issue.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "⚡ Urgency Level"
      description: "Select one or choose 'Other' to specify a custom priority below."
      options:
        - "🔴 High (Blocker)"
        - "🟡 Medium (Evolutionary)"
        - "🟢 Low (Technical Improvement)"
        - "🔘 Other (Specify in next field)"
    validations:
      required: true

  - type: input
    id: custom_priority
    attributes:
      label: "➕ Custom Priority (If 'Other' selected)"
      placeholder: "e.g., 🟣 Critical Security Patch"

  - type: checkboxes
    id: standard_prerequisites
    attributes:
      label: "📋 Standard Requirements Checklist"
      options:
        - label: "Initial architecture review completed"
        - label: "Backward compatibility verified"
        - label: "Base documentation updated"

  - type: textarea
    id: extra_requirements
    attributes:
      label: "🏗️ Additional & Custom Requirements"
      description: "Add any other requirements or modify the ones above by typing them here."
      placeholder: |
        - [ ] New requirement 1
        - [ ] Integration with specific API X
        - [ ] Unit tests for module Y
      value: |
        - [ ] 

  - type: textarea
    id: ideas_notes
    attributes:
      label: "💡 Creative Space / Notes"
      description: "General notes or ideas for implementation."
